<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>MODO Social Login Callback</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Malgun Gothic", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #f9fbf9;
      color: #333;
    }
    .container {
      text-align: center;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(0, 0, 0, 0.1);
      border-top-color: #03C75A;
      border-radius: 50%;
      animation: spin 1s infinite linear;
      margin: 0 auto 16px;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
  <script>
    window.onload = function() {
      const search = window.location.search;
      const hash = window.location.hash;
      // Redirect to HashRouter route
      window.location.href = window.location.origin + '/#/login/social-popup' + search + hash;
    };
  </script>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <p>로그인 인증 처리 중입니다. 잠시만 기다려 주세요...</p>
  </div>
</body>
</html>
